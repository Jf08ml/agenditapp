<style>
  :root {
    --blue: #1E6BFF;
    --blue-deep: #0A2A6B;
    --blue-soft: #E8F0FF;
    --ink: #0B1220;
    --ink-2: #2A3344;
    --muted: #5C6779;
    --line: #E6E9F0;
    --bg: #FBFCFE;
    --card: #FFFFFF;
    --wa: #25D366;
    --wa-deep: #128C7E;
    --warm: oklch(0.74 0.16 50);
    --warm-deep: oklch(0.58 0.18 45);
    --shadow-sm: 0 1px 2px rgba(11,18,32,0.04), 0 1px 3px rgba(11,18,32,0.06);
    --shadow-md: 0 4px 12px rgba(11,18,32,0.06), 0 12px 40px rgba(11,18,32,0.08);
    --shadow-lg: 0 30px 80px -20px rgba(30,107,255,0.25), 0 12px 40px rgba(11,18,32,0.10);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    line-height: 1.5;
  }
  img { max-width: 100%; display: block; }
  button { font-family: inherit; cursor: pointer; }
  a { color: inherit; text-decoration: none; }
  .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

  /* Reveal */
  .reveal { opacity: 0; transform: translateY(16px); transition: opacity .7s ease, transform .7s cubic-bezier(.2,.7,.2,1); }
  .reveal.in { opacity: 1; transform: none; }

  @keyframes blink { 0%, 60% { opacity: 1; } 61%, 100% { opacity: 0.2; } }
  @keyframes pulse-dot { 0%, 100% { transform: scale(1); opacity: 1;} 50% { transform: scale(1.4); opacity: 0.5; }}
  @keyframes float-up { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; }}
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  ::selection { background: var(--blue); color: white; }
</style>
